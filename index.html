<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DDP Forex Institute</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #07090F;
    --bg2:       #0D1017;
    --bg3:       #111520;
    --border:    rgba(255,255,255,0.07);
    --text:      #E8EAF0;
    --muted:     #6B7280;
    --green:     #22C55E;
    --green-dim: rgba(34,197,94,0.12);
    --green-glow:rgba(34,197,94,0.25);
    --blue:      #3B82F6;
    --blue-dim:  rgba(59,130,246,0.12);
    --blue-glow: rgba(59,130,246,0.25);
    --gold:      #C9A84C;
    --danger:    #EF4444;
    --radius:    8px;
  }

  html, body, #root { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Typography ── */
  .cinzel { font-family: 'Cinzel', serif; }

  /* ── Layout ── */
  .app-shell { display: flex; height: 100vh; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: 240px; min-width: 240px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 0;
    position: relative;
    z-index: 10;
  }
  .sidebar-logo {
    padding: 28px 24px 24px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo h1 {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    line-height: 1.3;
  }
  .sidebar-logo p {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .sidebar-section-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 20px 24px 8px;
    font-weight: 600;
  }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 24px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border-left: 2px solid transparent;
    user-select: none;
  }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .nav-item.active { color: var(--text); border-left-color: var(--gold); background: rgba(201,168,76,0.06); }
  .nav-item .icon { width: 16px; text-align: center; font-size: 14px; }

  .sidebar-footer {
    margin-top: auto;
    padding: 20px 24px;
    border-top: 1px solid var(--border);
  }
  .member-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .badge-beginner { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .badge-advanced { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(59,130,246,0.3); }
  .badge-admin { background: rgba(201,168,76,0.12); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
  .badge-pending { background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }

  .user-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .user-email { font-size: 11px; color: var(--muted); }
  .btn-logout {
    margin-top: 12px;
    width: 100%;
    padding: 8px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: var(--radius);
    font-family: 'Raleway', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

  /* ── Main content ── */
  .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

  .topbar {
    padding: 20px 36px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg2);
    position: sticky; top: 0; z-index: 5;
  }
  .topbar h2 {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text);
  }
  .topbar-right { display: flex; align-items: center; gap: 12px; }

  .page { padding: 36px; flex: 1; }

  /* ── Auth page ── */
  .auth-page {
    min-height: 100vh;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }
  .auth-bg-lines {
    position: absolute; inset: 0; pointer-events: none; overflow: hidden;
  }
  .auth-bg-lines::before, .auth-bg-lines::after {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.04);
  }
  .auth-bg-lines::before { top: -200px; left: -200px; }
  .auth-bg-lines::after  { bottom: -200px; right: -200px; }

  .auth-card {
    width: 100%; max-width: 420px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 48px 40px;
    position: relative;
  }
  .auth-card::before {
    content: '';
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .auth-logo {
    text-align: center; margin-bottom: 36px;
  }
  .auth-logo h1 {
    font-family: 'Cinzel', serif;
    font-size: 20px; font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
  }
  .auth-logo p {
    font-size: 11px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-top: 4px;
  }
  .auth-tabs {
    display: flex; gap: 0;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 28px;
    overflow: hidden;
  }
  .auth-tab {
    flex: 1; padding: 10px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Raleway', sans-serif;
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
  }
  .auth-tab.active { background: rgba(201,168,76,0.1); color: var(--gold); }

  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .form-input {
    width: 100%; padding: 11px 14px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    font-size: 13px;
    transition: border-color 0.2s;
    outline: none;
  }
  .form-input:focus { border-color: var(--gold); }
  .form-select {
    width: 100%; padding: 11px 14px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    font-size: 13px;
    outline: none; cursor: pointer;
  }
  .form-select option { background: var(--bg3); }

  .btn-primary {
    width: 100%; padding: 13px;
    background: var(--gold);
    border: none; border-radius: var(--radius);
    color: #07090F;
    font-family: 'Cinzel', serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
    margin-top: 8px;
  }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-sm {
    padding: 6px 14px;
    border: none; border-radius: var(--radius);
    font-family: 'Raleway', sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-approve { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .btn-approve:hover { background: var(--green); color: #07090F; }
  .btn-decline { background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
  .btn-decline:hover { background: var(--danger); color: #fff; }
  .btn-edit { background: rgba(201,168,76,0.1); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
  .btn-edit:hover { background: var(--gold); color: #07090F; }
  .btn-delete { background: rgba(239,68,68,0.08); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }
  .btn-delete:hover { background: var(--danger); color: #fff; }
  .btn-add {
    padding: 9px 18px;
    background: var(--gold);
    border: none; border-radius: var(--radius);
    color: #07090F;
    font-family: 'Raleway', sans-serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer; transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-add:hover { filter: brightness(1.1); }

  .alert {
    padding: 12px 14px;
    border-radius: var(--radius);
    font-size: 12px;
    margin-bottom: 16px;
  }
  .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #FCA5A5; }
  .alert-success { background: var(--green-dim); border: 1px solid rgba(34,197,94,0.3); color: #86EFAC; }
  .alert-info { background: var(--blue-dim); border: 1px solid rgba(59,130,246,0.3); color: #93C5FD; }

  /* ── Cards ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
  }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .card-title { font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600; letter-spacing: 0.08em; color: var(--text); }

  /* ── Stat cards ── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
  }
  .stat-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .stat-value { font-family: 'Cinzel', serif; font-size: 28px; font-weight: 700; color: var(--text); }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; padding: 10px 14px;
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); font-weight: 600;
    border-bottom: 1px solid var(--border);
  }
  td { padding: 12px 14px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  /* ── Admin tabs ── */
  .admin-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
  .admin-tab {
    padding: 12px 24px;
    background: transparent; border: none;
    color: var(--muted); font-family: 'Raleway', sans-serif;
    font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .admin-tab:hover { color: var(--text); }
  .admin-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* ── Course cards ── */
  .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
  .course-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
  }
  .course-card:hover { border-color: rgba(201,168,76,0.3); transform: translateY(-2px); }
  .course-thumb {
    height: 140px;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
    position: relative; overflow: hidden;
  }
  .course-thumb-beginner { background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(34,197,94,0.05)); }
  .course-thumb-advanced { background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(59,130,246,0.05)); }
  .course-thumb-label {
    position: absolute; top: 12px; right: 12px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 4px;
  }
  .course-body { padding: 18px 20px; }
  .course-title { font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .course-meta { font-size: 11px; color: var(--muted); }

  /* ── Section accordion ── */
  .section-item { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    cursor: pointer; transition: background 0.2s;
    background: var(--bg3);
  }
  .section-header:hover { background: rgba(255,255,255,0.03); }
  .section-title { font-family: 'Cinzel', serif; font-size: 12px; font-weight: 600; letter-spacing: 0.05em; }
  .section-chevron { color: var(--muted); transition: transform 0.2s; font-size: 12px; }
  .section-chevron.open { transform: rotate(180deg); }
  .section-lessons { border-top: 1px solid var(--border); }
  .lesson-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 18px;
    cursor: pointer; transition: background 0.2s;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .lesson-item:last-child { border-bottom: none; }
  .lesson-item:hover { background: rgba(255,255,255,0.03); }
  .lesson-item.active { background: rgba(201,168,76,0.06); }
  .lesson-icon { color: var(--muted); font-size: 12px; width: 16px; text-align: center; }
  .lesson-title { font-size: 13px; color: var(--text); flex: 1; }
  .lesson-duration { font-size: 11px; color: var(--muted); }

  /* ── Video player ── */
  .video-area {
    background: #000;
    border-radius: 10px;
    overflow: hidden;
    aspect-ratio: 16/9;
    margin-bottom: 20px;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .video-area iframe { width: 100%; height: 100%; border: none; }
  .video-placeholder { text-align: center; color: var(--muted); }
  .video-placeholder .big-icon { font-size: 48px; margin-bottom: 12px; }
  .video-placeholder p { font-size: 13px; }

  /* ── Journal ── */
  .journal-entry {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 12px;
  }
  .journal-date { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .journal-text { font-size: 13px; line-height: 1.7; white-space: pre-wrap; }
  .journal-textarea {
    width: 100%; min-height: 140px;
    padding: 14px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    font-size: 13px; line-height: 1.7;
    resize: vertical; outline: none;
    transition: border-color 0.2s;
  }
  .journal-textarea:focus { border-color: var(--gold); }

  /* ── Checklist ── */
  .checklist-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .checklist-item:hover { border-color: rgba(255,255,255,0.12); }
  .checklist-item.done { opacity: 0.6; }
  .check-box {
    width: 20px; height: 20px; flex-shrink: 0;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    font-size: 11px;
  }
  .check-box.checked { background: var(--green); border-color: var(--green); color: #07090F; font-weight: 700; }
  .check-text { font-size: 13px; flex: 1; }
  .check-text.done { text-decoration: line-through; color: var(--muted); }

  /* ── Playbook ── */
  .playbook-section { margin-bottom: 28px; }
  .playbook-section-title {
    font-family: 'Cinzel', serif;
    font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(201,168,76,0.2);
  }
  .playbook-rule {
    display: flex; gap: 14px;
    padding: 14px 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
  }
  .rule-num {
    font-family: 'Cinzel', serif;
    font-size: 11px; font-weight: 700;
    color: var(--gold); opacity: 0.7;
    flex-shrink: 0; width: 20px;
  }
  .rule-text { font-size: 13px; line-height: 1.6; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(7,9,15,0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 24px;
    backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    width: 100%; max-width: 480px;
    position: relative;
  }
  .modal-title { font-family: 'Cinzel', serif; font-size: 15px; font-weight: 600; margin-bottom: 24px; letter-spacing: 0.06em; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
  .btn-cancel {
    padding: 9px 18px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: var(--radius);
    font-family: 'Raleway', sans-serif;
    font-size: 12px; cursor: pointer; transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: var(--text); color: var(--text); }
  .btn-save {
    padding: 9px 18px;
    background: var(--gold);
    border: none;
    color: #07090F;
    border-radius: var(--radius);
    font-family: 'Raleway', sans-serif;
    font-size: 12px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-save:hover { filter: brightness(1.1); }

  /* ── Pending screen ── */
  .pending-screen {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); text-align: center; padding: 24px;
  }
  .pending-card {
    max-width: 420px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 48px 40px;
  }
  .pending-icon { font-size: 40px; margin-bottom: 20px; }
  .pending-title { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 600; letter-spacing: 0.08em; margin-bottom: 12px; }
  .pending-text { font-size: 13px; color: var(--muted); line-height: 1.7; }

  /* ── Admin password ── */
  .admin-pass-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 24px;
  }

  .empty-state { text-align: center; padding: 60px 24px; color: var(--muted); }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .empty-text { font-size: 13px; }

  .divider { height: 1px; background: var(--border); margin: 24px 0; }

  .tag {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 4px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
  }

  .course-detail-back {
    display: inline-flex; align-items: center; gap: 6px;

<body>
<div id="root"></div>

<script type="text/babel">
// ─── Supabase ───────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://cxjbyhzibjinkeypuaak.supabase.co';
const SUPABASE_ANON = 'sb_publishable_Ssp5xNESQAE10boERO-ESg_c-XENyQ8';
const ADMIN_PASSWORD = 'ddpadmin2024'; // Change this

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ─── Helpers ─────────────────────────────────────────────────────────────────
const { useState, useEffect, useRef } = React;

function fmt(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-ZA', { day:'numeric', month:'short', year:'numeric' });
}

// ─── Badge ───────────────────────────────────────────────────────────────────
function Badge({ level }) {
  const map = {
    beginner: ['badge-beginner','Beginner'],
    advanced: ['badge-advanced','Advanced'],
    admin:    ['badge-admin','Admin'],
    pending:  ['badge-pending','Pending'],
  };
  const [cls, label] = map[level] || ['badge-pending', level || 'Pending'];
  return <span className={`member-badge ${cls}`}>● {label}</span>;
}

// ─── AUTH PAGE ───────────────────────────────────────────────────────────────
function AuthPage({ onLogin }) {
  const [tab, setTab] = useState('login');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [fullName, setFullName] = useState('');
  const [level, setLevel] = useState('beginner');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [success, setSuccess] = useState('');

  async function handleLogin(e) {
    e.preventDefault();
    setLoading(true); setError('');
    try {
      const { data, error: err } = await supabase.auth.signInWithPassword({ email, password });
      if (err) throw err;
      const { data: profile } = await supabase.from('users').select('*').eq('id', data.user.id).single();
      onLogin({ ...data.user, profile: profile || {} });
    } catch(err) {
      setError(err.message);
    } finally { setLoading(false); }
  }

  async function handleRegister(e) {
    e.preventDefault();
    setLoading(true); setError(''); setSuccess('');
    try {
      const { data, error: err } = await supabase.auth.signUp({ email, password });
      if (err) throw err;
      await supabase.from('users').insert({
        id: data.user.id, email, full_name: fullName,
        membership_level: level, status: 'pending', created_at: new Date().toISOString()
      });
      setSuccess('Registration successful! Your account is pending admin approval.');
      setTab('login');
    } catch(err) {
      setError(err.message);
    } finally { setLoading(false); }
  }

  return (
    <div className="auth-page">
      <div className="auth-bg-lines" />
      <div className="auth-card">
        <div className="auth-logo">
          <h1>DDP FOREX</h1>
          <p>Institute · Member Portal</p>
        </div>

        {error && <div className="alert alert-error">{error}</div>}
        {success && <div className="alert alert-success">{success}</div>}

        <div className="auth-tabs">
          <button className={`auth-tab ${tab==='login'?'active':''}`} onClick={()=>setTab('login')}>Sign In</button>
          <button className={`auth-tab ${tab==='register'?'active':''}`} onClick={()=>setTab('register')}>Register</button>
        </div>

        {tab === 'login' ? (
          <form onSubmit={handleLogin}>
            <div className="form-group">
              <label className="form-label">Email Address</label>
              <input className="form-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} required placeholder="you@example.com"/>
            </div>
            <div className="form-group">
              <label className="form-label">Password</label>
              <input className="form-input" type="password" value={password} onChange={e=>setPassword(e.target.value)} required placeholder="••••••••"/>
            </div>
            <button className="btn-primary" type="submit" disabled={loading}>
              {loading ? 'Signing In...' : 'Sign In'}
            </button>
          </form>
        ) : (
          <form onSubmit={handleRegister}>
            <div className="form-group">
              <label className="form-label">Full Name</label>
              <input className="form-input" type="text" value={fullName} onChange={e=>setFullName(e.target.value)} required placeholder="John Doe"/>
            </div>
            <div className="form-group">
              <label className="form-label">Email Address</label>
              <input className="form-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} required placeholder="you@example.com"/>
            </div>
            <div className="form-group">
              <label className="form-label">Password</label>
              <input className="form-input" type="password" value={password} onChange={e=>setPassword(e.target.value)} required placeholder="Min 6 characters"/>
            </div>
            <div className="form-group">
              <label className="form-label">Membership Level</label>
              <select className="form-select" value={level} onChange={e=>setLevel(e.target.value)}>
                <option value="beginner">Beginner</option>
                <option value="advanced">Advanced</option>
              </select>
            </div>
            <button className="btn-primary" type="submit" disabled={loading}>
              {loading ? 'Creating Account...' : 'Create Account'}
            </button>
          </form>
        )}
      </div>
    </div>
  );
}

// ─── PENDING SCREEN ──────────────────────────────────────────────────────────
function PendingScreen({ user, onLogout }) {

}

// ─── ADMIN GUARD ─────────────────────────────────────────────────────────────
function AdminGuard({ onPass }) {
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  function check(e) {
    e.preventDefault();
    if (pw === ADMIN_PASSWORD) onPass();
    else setErr('Incorrect admin password.');
  }
  return (
    <div className="admin-pass-overlay">
      <div className="auth-card" style={{maxWidth:380}}>
        <div className="auth-logo">
          <h1>DDP FOREX</h1>
          <p>Admin Access Required</p>
        </div>
        {err && <div className="alert alert-error">{err}</div>}
        <form onSubmit={check}>
          <div className="form-group">
            <label className="form-label">Admin Password</label>
            <input className="form-input" type="password" value={pw} onChange={e=>setPw(e.target.value)} autoFocus/>
          </div>
          <button className="btn-primary" type="submit">Enter Admin Panel</button>
        </form>
      </div>
    </div>
  );
}

// ─── ADMIN PANEL ─────────────────────────────────────────────────────────────
function AdminPanel() {
  const [tab, setTab] = useState('users');
  const [users, setUsers] = useState([]);
  const [courses, setCourses] = useState([]);
  const [sections, setSections] = useState([]);
  const [videos, setVideos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({});
  const [msg, setMsg] = useState('');

  async function load() {
    setLoading(true);
    const [u, c, s, v] = await Promise.all([
      supabase.from('users').select('*').order('created_at', {ascending:false}),
      supabase.from('courses').select('*').order('order_index'),
      supabase.from('sections').select('*').order('order_index'),
      supabase.from('videos').select('*').order('order_index'),
    ]);
    setUsers(u.data || []);
    setCourses(c.data || []);
    setSections(s.data || []);
    setVideos(v.data || []);
    setLoading(false);
  }

  useEffect(() => { load(); }, []);

  async function approveUser(id, level) {
    await supabase.from('users').update({ status: 'active' }).eq('id', id);
    setMsg('User approved.'); load();
  }
  async function declineUser(id) {
    await supabase.from('users').update({ status: 'declined' }).eq('id', id);
    setMsg('User declined.'); load();
  }
  async function changeLevel(id, level) {
    await supabase.from('users').update({ membership_level: level }).eq('id', id);
    load();
  }

  async function saveModal() {
    const { type, id } = modal;
    if (type === 'course') {
      if (id) await supabase.from('courses').update(form).eq('id', id);
      else await supabase.from('courses').insert({ ...form, order_index: courses.length });
    } else if (type === 'section') {
      if (id) await supabase.from('sections').update(form).eq('id', id);
      else await supabase.from('sections').insert({ ...form, order_index: sections.length });
    } else if (type === 'video') {
      if (id) await supabase.from('videos').update(form).eq('id', id);
      else await supabase.from('videos').insert({ ...form, order_index: videos.length });
    }
    setModal(null); setForm({}); load();
  }

  async function deleteItem(table, id) {
    if (!window.confirm('Are you sure?')) return;
    await supabase.from(table).delete().eq('id', id);
    load();
  }

  function openModal(type, item={}) {
    setModal({ type, id: item.id || null });
    setForm(item);
  }

  const stats = {
    total: users.length,
    active: users.filter(u=>u.status==='active').length,
    pending: users.filter(u=>u.status==='pending').length,
    beginner: users.filter(u=>u.membership_level==='beginner'&&u.status==='active').length,
    advanced: users.filter(u=>u.membership_level==='advanced'&&u.status==='active').length,
  };

  return (
    <div className="page">
      <h1 className="cinzel" style={{fontSize:18,fontWeight:700,letterSpacing:'0.08em',marginBottom:28,color:'var(--gold)'}}>
        Admin Panel
      </h1>

      {msg && <div className="alert alert-success" style={{marginBottom:20}}>{msg}</div>}

      {tab === 'users' && (
        <div className="stats-grid" style={{marginBottom:28}}>
          {[['Total Members',stats.total,''],['Active',stats.active,''],['Pending',stats.pending,''],['Beginners',stats.beginner,''],['Advanced',stats.advanced,'']].map(([l,v]) => (
            <div key={l} className="stat-card"><div className="stat-label">{l}</div><div className="stat-value">{v}</div></div>
          ))}
        </div>
      )}

      <div className="admin-tabs">
        {['users','courses','sections','videos'].map(t => (
          <button key={t} className={`admin-tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>
            {t.charAt(0).toUpperCase()+t.slice(1)}
          </button>
        ))}
      </div>

      {loading ? <div style={{color:'var(--muted)',textAlign:'center',padding:40}}>Loading…</div> : (
        <>
          {/* ── Users ── */}
          {tab==='users' && (
            <div className="card">
              <div className="table-wrap">
                <table>
                  <thead><tr><th>Name</th><th>Email</th><th>Level</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
                  <tbody>
                    {users.map(u => (
                      <tr key={u.id}>
                        <td style={{fontWeight:600}}>{u.full_name || '—'}</td>
                        <td style={{color:'var(--muted)'}}>{u.email}</td>
                        <td>
                          <select
                            className="form-select" style={{width:130,padding:'4px 8px',fontSize:12}}
                            value={u.membership_level||'beginner'}
                            onChange={e=>changeLevel(u.id, e.target.value)}
                          >
                            <option value="beginner">Beginner</option>
                            <option value="advanced">Advanced</option>
                          </select>
                        </td>
                        <td><Badge level={u.status==='active'?u.membership_level:u.status}/></td>
                        <td style={{color:'var(--muted)'}}>{fmt(u.created_at)}</td>
                        <td>
                          <div style={{display:'flex',gap:6}}>
                            {u.status==='pending' && <>
                              <button className="btn-sm btn-approve" onClick={()=>approveUser(u.id,u.membership_level)}>Approve</button>
                              <button className="btn-sm btn-decline" onClick={()=>declineUser(u.id)}>Decline</button>
                            </>}
                            {u.status==='active' && <span style={{fontSize:11,color:'var(--green)'}}>Active</span>}
                            {u.status==='declined' && <span style={{fontSize:11,color:'var(--danger)'}}>Declined</span>}
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                {users.length === 0 && <div className="empty-state"><div className="empty-icon">👥</div><div className="empty-text">No members yet.</div></div>}
              </div>
            </div>
          )}

          {/* ── Courses ── */}
          {tab==='courses' && (
            <div>
              <div style={{marginBottom:20}}><button className="btn-add" onClick={()=>openModal('course')}>+ Add Course</button></div>
              <div className="card">
                <table>
                  <thead><tr><th>Title</th><th>Level</th><th>Description</th><th>Actions</th></tr></thead>
                  <tbody>
                    {courses.map(c => (
                      <tr key={c.id}>
                        <td style={{fontWeight:600}}>{c.title}</td>
                        <td><Badge level={c.level}/></td>
                        <td style={{color:'var(--muted)',maxWidth:280,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.description}</td>
                        <td>
                          <div style={{display:'flex',gap:6}}>
                            <button className="btn-sm btn-edit" onClick={()=>openModal('course',c)}>Edit</button>
                            <button className="btn-sm btn-delete" onClick={()=>deleteItem('courses',c.id)}>Delete</button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                {courses.length===0 && <div className="empty-state"><div className="empty-icon">📚</div><div className="empty-text">No courses yet.</div></div>}
              </div>
            </div>
          )}

          {/* ── Sections ── */}
          {tab==='sections' && (
            <div>
              <div style={{marginBottom:20}}><button className="btn-add" onClick={()=>openModal('section')}>+ Add Section</button></div>
              <div className="card">
                <table>
                  <thead><tr><th>Title</th><th>Course</th><th>Actions</th></tr></thead>
                  <tbody>
                    {sections.map(s => (
                      <tr key={s.id}>
                        <td style={{fontWeight:600}}>{s.title}</td>
                        <td style={{color:'var(--muted)'}}>{courses.find(c=>c.id===s.course_id)?.title||s.course_id}</td>
                        <td>
                          <div style={{display:'flex',gap:6}}>
                            <button className="btn-sm btn-edit" onClick={()=>openModal('section',s)}>Edit</button>
                            <button className="btn-sm btn-delete" onClick={()=>deleteItem('sections',s.id)}>Delete</button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                {sections.length===0 && <div className="empty-state"><div className="empty-icon">📂</div><div className="empty-text">No sections yet.</div></div>}
              </div>
            </div>
          )}

          {/* ── Videos ── */}
          {tab==='videos' && (
            <div>
              <div style={{marginBottom:20}}><button className="btn-add" onClick={()=>openModal('video')}>+ Add Video</button></div>
              <div className="card">
                <table>
                  <thead><tr><th>Title</th><th>Section</th><th>Duration</th><th>Actions</th></tr></thead>
                  <tbody>
                    {videos.map(v => (
                      <tr key={v.id}>
                        <td style={{fontWeight:600}}>{v.title}</td>
                        <td style={{color:'var(--muted)'}}>{sections.find(s=>s.id===v.section_id)?.title||v.section_id}</td>
                        <td style={{color:'var(--muted)'}}>{v.duration||'—'}</td>
                        <td>
                          <div style={{display:'flex',gap:6}}>
                            <button className="btn-sm btn-edit" onClick={()=>openModal('video',v)}>Edit</button>
                            <button className="btn-sm btn-delete" onClick={()=>deleteItem('videos',v.id)}>Delete</button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                {videos.length===0 && <div className="empty-state"><div className="empty-icon">🎬</div><div className="empty-text">No videos yet.</div></div>}
              </div>
            </div>
          )}
        </>
      )}

      {/* ── Modals ── */}
      {modal && (
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget){setModal(null);setForm({});}}}>
          <div className="modal">
            <div className="modal-title cinzel">
              {modal.id ? 'Edit' : 'Add'} {modal.type.charAt(0).toUpperCase()+modal.type.slice(1)}
            </div>

            {modal.type === 'course' && (
              <>
                <div className="form-group"><label className="form-label">Title</label>
                  <input className="form-input" value={form.title||''} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Course title"/></div>
                <div className="form-group"><label className="form-label">Description</label>
                  <textarea className="journal-textarea" style={{minHeight:80}} value={form.description||''} onChange={e=>setForm({...form,description:e.target.value})} placeholder="Short description"/></div>
                <div className="form-group"><label className="form-label">Access Level</label>
                  <select className="form-select" value={form.level||'beginner'} onChange={e=>setForm({...form,level:e.target.value})}>
                    <option value="beginner">Beginner</option>
                    <option value="advanced">Advanced</option>
                  </select></div>
                <div className="form-group"><label className="form-label">Thumbnail Emoji</label>
                  <input className="form-input" value={form.emoji||''} onChange={e=>setForm({...form,emoji:e.target.value})} placeholder="📈"/></div>
              </>
            )}

            {modal.type === 'section' && (
              <>
                <div className="form-group"><label className="form-label">Section Title</label>
                  <input className="form-input" value={form.title||''} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Module name"/></div>
                <div className="form-group"><label className="form-label">Course</label>
                  <select className="form-select" value={form.course_id||''} onChange={e=>setForm({...form,course_id:e.target.value})}>
                    <option value="">— Select Course —</option>
                    {courses.map(c=><option key={c.id} value={c.id}>{c.title}</option>)}
                  </select></div>
              </>
            )}

            {modal.type === 'video' && (
              <>
                <div className="form-group"><label className="form-label">Video Title</label>
                  <input className="form-input" value={form.title||''} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Lesson title"/></div>
                <div className="form-group"><label className="form-label">Section</label>
                  <select className="form-select" value={form.section_id||''} onChange={e=>setForm({...form,section_id:e.target.value})}>
                    <option value="">— Select Section —</option>
                    {sections.map(s=><option key={s.id} value={s.id}>{s.title}</option>)}
                  </select></div>
                <div className="form-group"><label className="form-label">Bunny.net Embed Code</label>
                  <textarea className="journal-textarea" style={{minHeight:80}} value={form.embed_code||''} onChange={e=>setForm({...form,embed_code:e.target.value})} placeholder='Paste full Bunny.net iframe embed code here'/></div>
                <div className="form-group"><label className="form-label">Duration (e.g. 12:30)</label>
                  <input className="form-input" value={form.duration||''} onChange={e=>setForm({...form,duration:e.target.value})} placeholder="00:00"/></div>
                <div className="form-group"><label className="form-label">Description</label>
                  <textarea className="journal-textarea" style={{minHeight:60}} value={form.description||''} onChange={e=>setForm({...form,description:e.target.value})} placeholder="Optional lesson description"/></div>
              </>
            )}

            <div className="modal-actions">
              <button className="btn-cancel" onClick={()=>{setModal(null);setForm({});}}>Cancel</button>
              <button className="btn-save" onClick={saveModal}>Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── COURSES PAGE ─────────────────────────────────────────────────────────────
function CoursesPage({ userLevel }) {
  const [courses, setCourses] = useState([]);
  const [selected, setSelected] = useState(null);
  const [sections, setSections] = useState([]);
  const [videos, setVideos] = useState([]);
  const [activeVideo, setActiveVideo] = useState(null);
  const [openSections, setOpenSections] = useState({});
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    async function load() {
      const { data: c } = await supabase.from('courses').select('*').order('order_index');
      setCourses(c || []);
      setLoading(false);
    }
    load();
  }, []);

  async function openCourse(course) {
    setSelected(course);
    const { data: s } = await supabase.from('sections').select('*').eq('course_id', course.id).order('order_index');
    setSections(s || []);
    const ids = (s||[]).map(x=>x.id);
    if (ids.length) {
      const { data: v } = await supabase.from('videos').select('*').in('section_id', ids).order('order_index');
      setVideos(v || []);
      if (v && v.length) setActiveVideo(v[0]);
    }
    if (s) {
      const open = {};
      s.forEach(sec => open[sec.id] = true);
      setOpenSections(open);
    }
  }

  const canAccess = (course) => {
    if (userLevel === 'advanced') return true;
    return course.level === 'beginner';
  };

  if (loading) return <div className="page"><div style={{color:'var(--muted)',textAlign:'center',padding:60}}>Loading courses…</div></div>;

  if (selected) {
    return (
      <div className="page">
        <div className="course-detail-back" onClick={()=>{setSelected(null);setActiveVideo(null);}}>
          ← Back to Courses
        </div>
        <div style={{marginBottom:24}}>
          <h2 className="cinzel" style={{fontSize:18,fontWeight:700,letterSpacing:'0.06em',marginBottom:6}}>{selected.title}</h2>
          <Badge level={selected.level}/>
        </div>
        <div className="two-col">
          <div>
            {/* Video Player */}
            <div className="video-area">
              {activeVideo?.embed_code ? (
                <div style={{width:'100%',height:'100%',position:'relative'}}
                  dangerouslySetInnerHTML={{__html: activeVideo.embed_code}}/>
              ) : (
                <div className="video-placeholder">
                  <div className="big-icon">▶</div>
                  <p>{activeVideo ? 'No embed code for this lesson.' : 'Select a lesson to begin.'}</p>
                </div>
              )}
            </div>
            {activeVideo && (
              <div style={{marginBottom:16}}>
                <h3 className="cinzel" style={{fontSize:14,fontWeight:600,marginBottom:6,letterSpacing:'0.04em'}}>{activeVideo.title}</h3>
                {activeVideo.description && <p style={{color:'var(--muted)',fontSize:13,lineHeight:1.7}}>{activeVideo.description}</p>}
              </div>
            )}
          </div>

          {/* Sidebar: Sections + Lessons */}
          <div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--muted)',marginBottom:12}}>Course Content</div>
            {sections.length === 0 && <div className="empty-state"><div className="empty-text">No sections added yet.</div></div>}
            {sections.map(sec => {
              const lessonList = videos.filter(v => v.section_id === sec.id);
              const isOpen = openSections[sec.id];
              return (
                <div key={sec.id} className="section-item">
                  <div className="section-header" onClick={()=>setOpenSections(p=>({...p,[sec.id]:!p[sec.id]}))}>
                    <div>
                      <div className="section-title">{sec.title}</div>
                      <div style={{fontSize:11,color:'var(--muted)',marginTop:3}}>{lessonList.length} lesson{lessonList.length!==1?'s':''}</div>
                    </div>
                    <span className={`section-chevron ${isOpen?'open':''}`}>▼</span>
                  </div>
                  {isOpen && (
                    <div className="section-lessons">
                      {lessonList.length === 0 && <div style={{padding:'12px 18px',color:'var(--muted)',fontSize:12}}>No lessons yet.</div>}
                      {lessonList.map(v => (
                        <div key={v.id} className={`lesson-item ${activeVideo?.id===v.id?'active':''}`} onClick={()=>setActiveVideo(v)}>
                          <span className="lesson-icon">{activeVideo?.id===v.id ? '▶' : '○'}</span>
                          <span className="lesson-title">{v.title}</span>
                          {v.duration && <span className="lesson-duration">{v.duration}</span>}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // Course listing
  return (
    <div className="page">
      <div style={{marginBottom:28}}>
        <h2 className="cinzel" style={{fontSize:18,fontWeight:700,letterSpacing:'0.08em',marginBottom:6}}>Courses</h2>
        <p style={{color:'var(--muted)',fontSize:13}}>
          {userLevel === 'beginner' ? 'Beginner courses available to you.' : 'All courses available to you.'}
        </p>
      </div>
      {courses.length === 0 && <div className="empty-state"><div className="empty-icon">📚</div><div className="empty-text">No courses published yet.</div></div>}
      <div className="courses-grid">
        {courses.map(course => {
          const locked = !canAccess(course);
          return (
            <div key={course.id} className="course-card" style={locked?{opacity:0.4,cursor:'not-allowed'}:{}} onClick={()=>!locked&&openCourse(course)}>
              <div className={`course-thumb course-thumb-${course.level}`}>
                <span>{course.emoji || (course.level==='advanced' ? '📊' : '📈')}</span>
                <span className={`course-thumb-label tag`} style={course.level==='advanced'?{background:'var(--blue-dim)',color:'var(--blue)'}:{background:'var(--green-dim)',color:'var(--green)'}}>
                  {course.level}
                </span>
                {locked && <span style={{position:'absolute',top:12,left:12,fontSize:18}}>🔒</span>}
              </div>
              <div className="course-body">
                <div className="course-title">{course.title}</div>
                <div className="course-meta">{course.description}</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── JOURNAL PAGE ─────────────────────────────────────────────────────────────
function JournalPage({ userId }) {
  const [entries, setEntries] = useState([]);
  const [text, setText] = useState('');
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    async function load() {
      const { data } = await supabase.from('journal_entries').select('*').eq('user_id', userId).order('created_at', {ascending:false});
      setEntries(data || []);
      setLoading(false);
    }
    load();
  }, [userId]);

  async function save() {
    if (!text.trim()) return;
    setSaving(true);
    await supabase.from('journal_entries').insert({ user_id: userId, content: text, created_at: new Date().toISOString() });
    setText('');
    const { data } = await supabase.from('journal_entries').select('*').eq('user_id', userId).order('created_at', {ascending:false});
    setEntries(data || []);
    setSaving(false);
  }

  async function deleteEntry(id) {
    if (!window.confirm('Delete this entry?')) return;
    await supabase.from('journal_entries').delete().eq('id', id);
    setEntries(e => e.filter(x=>x.id!==id));
  }

  return (
    <div className="page">
      <div style={{marginBottom:28}}>
        <h2 className="cinzel" style={{fontSize:18,fontWeight:700,letterSpacing:'0.08em',marginBottom:6}}>Trading Journal</h2>
        <p style={{color:'var(--muted)',fontSize:13}}>Document your trades, reflections, and learning insights.</p>
      </div>
      <div className="card" style={{marginBottom:24}}>
        <div className="card-title" style={{marginBottom:14}}>New Entry</div>
        <textarea
          className="journal-textarea"
          value={text}
          onChange={e=>setText(e.target.value)}
          placeholder="What did you observe in the market today? What trades did you take? What did you learn?"
        />
        <div style={{display:'flex',justifyContent:'flex-end',marginTop:12}}>
          <button className="btn-add" disabled={saving||!text.trim()} onClick={save}>
            {saving ? 'Saving…' : '+ Save Entry'}
          </button>
        </div>
      </div>
      {loading ? <div style={{color:'var(--muted)',textAlign:'center',padding:40}}>Loading…</div> : (
        entries.length === 0
          ? <div className="empty-state"><div className="empty-icon">📓</div><div className="empty-text">No entries yet. Write your first journal entry.</div></div>
          : entries.map(e => (
            <div key={e.id} className="journal-entry">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <div className="journal-date">{fmt(e.created_at)}</div>
                <button className="btn-sm btn-delete" style={{fontSize:10}} onClick={()=>deleteEntry(e.id)}>Delete</button>
              </div>
              <div className="journal-text">{e.content}</div>
            </div>
          ))
      )}
    </div>
  );
}

// ─── CHECKLIST PAGE ───────────────────────────────────────────────────────────
const DEFAULT_CHECKLIST = [
  'Set up your trading account with a reputable broker',
  'Complete the Beginner Foundation course',
  'Paper trade for at least 30 days',
  'Document your first 10 journal entries',
  'Define your personal risk tolerance',
  'Learn to read candlestick patterns',
  'Understand support and resistance levels',
  'Master the 3 core DDP entry models',
  'Build and backtest your trading plan',
  'Complete 60 consecutive days without breaking your rules',
];

function ChecklistPage({ userId }) {
  const [checked, setChecked] = useState({});
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    async function load() {
      const { data } = await supabase.from('checklists').select('*').eq('user_id', userId).single();
      if (data?.items) setChecked(data.items);
      setLoading(false);
    }
    load();
  }, [userId]);

  async function toggle(idx) {
    const next = { ...checked, [idx]: !checked[idx] };
    setChecked(next);
    const { data } = await supabase.from('checklists').select('id').eq('user_id', userId).single();
    if (data) await supabase.from('checklists').update({ items: next }).eq('user_id', userId);
    else await supabase.from('checklists').insert({ user_id: userId, items: next });
  }

  const done = Object.values(checked).filter(Boolean).length;
  const pct = Math.round((done / DEFAULT_CHECKLIST.length) * 100);

  return (
    <div className="page">
      <div style={{marginBottom:28}}>
        <h2 className="cinzel" style={{fontSize:18,fontWeight:700,letterSpacing:'0.08em',marginBottom:6}}>Trader Checklist</h2>
        <p style={{color:'var(--muted)',fontSize:13}}>{done} of {DEFAULT_CHECKLIST.length} milestones completed ({pct}%)</p>
      </div>
      <div style={{height:4,background:'var(--bg3)',borderRadius:4,marginBottom:28,overflow:'hidden'}}>
        <div style={{width:`${pct}%`,height:'100%',background:'var(--green)',borderRadius:4,transition:'width 0.4s'}}/>
      </div>
      {loading ? <div style={{color:'var(--muted)',textAlign:'center',padding:40}}>Loading…</div> : (
        DEFAULT_CHECKLIST.map((item, idx) => (
          <div key={idx} className={`checklist-item ${checked[idx]?'done':''}`} onClick={()=>toggle(idx)}>
            <div className={`check-box ${checked[idx]?'checked':''}`}>{checked[idx]?'✓':''}</div>
            <div className={`check-text ${checked[idx]?'done':''}`}>{item}</div>
          </div>
        ))
      )}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [page, setPage] = useState('dashboard');
  const [isAdmin, setIsAdmin] = useState(false);
  const [adminAuthed, setAdminAuthed] = useState(false);

  useEffect(() => {
    supabase.auth.getSession().then(async ({ data: { session } }) => {
      if (session) {
        const { data: profile } = await supabase.from('users').select('*').eq('id', session.user.id).single();
        setUser({ ...session.user, profile: profile || {} });
      }
      setLoading(false);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange(async (_event, session) => {
      if (session) {
        const { data: profile } = await supabase.from('users').select('*').eq('id', session.user.id).single();
        setUser({ ...session.user, profile: profile || {} });
      } else { setUser(null); }
    });
    return () => subscription.unsubscribe();
  }, []);

  async function logout() {
    await supabase.auth.signOut();
    setUser(null); setIsAdmin(false); setAdminAuthed(false); setPage('dashboard');
  }

  if (loading) return (
    <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}>
      <div className="cinzel" style={{color:'var(--gold)',fontSize:13,letterSpacing:'0.15em'}}>DDP FOREX INSTITUTE</div>
    </div>
  );

  if (!user) return <AuthPage onLogin={u => setUser(u)} />;

  const status = user.profile?.status;
  const level  = user.profile?.membership_level || 'beginner';

  // Check admin by email flag in DB or hardcode
  const isAdminUser = user.profile?.is_admin === true;

  if (status !== 'active' && !isAdminUser) {
    if (status === 'declined') return (
      <div className="pending-screen">
        <div className="pending-card">
          <div className="pending-icon">✗</div>
          <h2 className="pending-title cinzel">Access Declined</h2>
          <p className="pending-text">Your membership application has been declined. Please contact support.</p>
          <button className="btn-logout" style={{marginTop:28}} onClick={logout}>Sign Out</button>
        </div>
      </div>
    );
    return <PendingScreen user={user} onLogout={logout} />;
  }

  // Admin mode
  if (isAdmin) {
    if (!adminAuthed) return <AdminGuard onPass={() => setAdminAuthed(true)} />;
    return (
      <div className="app-shell">
        <aside className="sidebar">
          <div className="sidebar-logo"><h1>DDP FOREX<br/>INSTITUTE</h1><p>Admin Panel</p></div>
          <div className="sidebar-section-label">Navigation</div>
          <div className="nav-item active"><span className="icon">⚙</span> Admin Panel</div>
          <div className="nav-item" onClick={()=>setIsAdmin(false)}><span className="icon">←</span> Exit Admin</div>
          <div className="sidebar-footer">
            <Badge level="admin"/>
            <div className="user-name">{user.profile?.full_name || 'Admin'}</div>
            <div className="user-email">{user.email}</div>
            <button className="btn-logout" onClick={logout}>Sign Out</button>
          </div>
        </aside>
        <main className="main">
          <div className="topbar">
            <h2>Admin Panel</h2>
            <div className="topbar-right"><Badge level="admin"/></div>
          </div>
          <AdminPanel />
        </main>
      </div>
    );
  }

  const NAV = [
    { id:'dashboard', icon:'◈', label:'Dashboard' },
    { id:'courses',   icon:'▣', label:'Courses' },
    { id:'journal',   icon:'◎', label:'Journal' },
    { id:'checklist', icon:'✦', label:'Checklist' },
    { id:'playbook',  icon:'◉', label:'Playbook' },
  ];

  const PAGE_TITLES = { dashboard:'Dashboard', courses:'Courses', journal:'Trading Journal', checklist:'Trader Checklist', playbook:'Playbook' };

  return (
    <div className="app-shell">
      <aside className="sidebar">
        <div className="sidebar-logo"><h1>DDP FOREX<br/>INSTITUTE</h1><p>Member Portal</p></div>
        <div className="sidebar-section-label">Menu</div>
        {NAV.map(n => (
          <div key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
            <span className="icon">{n.icon}</span>{n.label}
          </div>
        ))}
        {isAdminUser && (
          <>
            <div className="sidebar-section-label">Management</div>
            <div className="nav-item" onClick={()=>setIsAdmin(true)}><span className="icon">⚙</span>Admin Panel</div>
          </>
        )}
        <div className="sidebar-footer">
          <Badge level={level}/>
          <div className="user-name">{user.profile?.full_name || 'Trader'}</div>
          <div className="user-email">{user.email}</div>
          <button className="btn-logout" onClick={logout}>Sign Out</button>
        </div>
      </aside>
      <main className="main">
        <div className="topbar">
          <h2>{PAGE_TITLES[page]}</h2>
          <div className="topbar-right"><Badge level={level}/></div>
        </div>
        {page==='dashboard'  && <DashboardPage user={user}/>}
        {page==='courses'    && <CoursesPage userLevel={level}/>}
        {page==='journal'    && <JournalPage userId={user.id}/>}
        {page==='checklist'  && <ChecklistPage userId={user.id}/>}
        {page==='playbook'   && <PlaybookPage/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
