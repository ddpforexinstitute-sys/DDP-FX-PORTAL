<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DDP Forex Institute</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07090F;--bg2:#0D1017;--bg3:#111520;--border:rgba(255,255,255,0.07);--text:#E8EAF0;--muted:#6B7280;--green:#22C55E;--gdim:rgba(34,197,94,0.12);--blue:#3B82F6;--bdim:rgba(59,130,246,0.12);--gold:#C9A84C;--red:#EF4444;--r:8px}
html,body{height:100%;font-family:'Raleway',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
#app{height:100%}
.hide{display:none!important}
/* SHELL */
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;min-width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sb-logo{padding:24px;border-bottom:1px solid var(--border);text-align:center}
.logo-big{font-family:'Cinzel',serif;font-size:26px;font-weight:900;color:var(--gold);letter-spacing:.15em;display:block}
.logo-sm{font-family:'Cinzel',serif;font-size:9px;color:var(--muted);letter-spacing:.3em;text-transform:uppercase;display:block;margin-top:2px}
.sb-lbl{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);padding:20px 24px 8px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 24px;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;border-left:2px solid transparent}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.nav-item.active{color:var(--text);border-left-color:var(--gold);background:rgba(201,168,76,0.06)}
.sb-foot{margin-top:auto;padding:20px 24px;border-top:1px solid var(--border)}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{padding:20px 36px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);position:sticky;top:0;z-index:5}
.topbar h2{font-family:'Cinzel',serif;font-size:16px;font-weight:600;letter-spacing:.08em}
.page{padding:36px;flex:1}
/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-box{width:100%;max-width:440px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:48px 40px;position:relative}
.auth-box::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo .logo-big{font-size:34px}
.auth-logo p{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:6px}
.tab-row{display:flex;border:1px solid var(--border);border-radius:var(--r);margin-bottom:28px;overflow:hidden}
.tab-btn{flex:1;padding:10px;background:transparent;border:none;color:var(--muted);font-family:'Raleway',sans-serif;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.tab-btn.active{background:rgba(201,168,76,0.1);color:var(--gold)}
.fg{margin-bottom:16px}
.fl{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.fi{width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Raleway',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--gold)}
select.fi{cursor:pointer}
textarea.fi{resize:vertical;line-height:1.7}
.btn{width:100%;padding:13px;background:var(--gold);border:none;border-radius:var(--r);color:#07090F;font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:8px}
.btn:hover{filter:brightness(1.1)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{padding:6px 14px;border-radius:var(--r);font-family:'Raleway',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid}
.btn-green{background:var(--gdim);color:var(--green);border-color:rgba(34,197,94,0.3)}
.btn-green:hover{background:var(--green);color:#07090F}
.btn-red{background:rgba(239,68,68,0.08);color:var(--red);border-color:rgba(239,68,68,0.3)}
.btn-red:hover{background:var(--red);color:#fff}
.btn-gold{background:rgba(201,168,76,0.1);color:var(--gold);border-color:rgba(201,168,76,0.3)}
.btn-gold:hover{background:var(--gold);color:#07090F}
.btn-add{padding:9px 18px;background:var(--gold);border:none;border-radius:var(--r);color:#07090F;font-family:'Raleway',sans-serif;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-add:hover{filter:brightness(1.1)}
.alert{padding:12px 14px;border-radius:var(--r);font-size:12px;margin-bottom:16px}
.alert-err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#FCA5A5}
.alert-ok{background:var(--gdim);border:1px solid rgba(34,197,94,0.3);color:#86EFAC}
/* BADGE */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.badge-b{background:var(--gdim);color:var(--green);border:1px solid rgba(34,197,94,0.3)}
.badge-a{background:var(--bdim);color:var(--blue);border:1px solid rgba(59,130,246,0.3)}
.badge-admin{background:rgba(201,168,76,0.12);color:var(--gold);border:1px solid rgba(201,168,76,0.3)}
.badge-p{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.3)}
/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:20px}
.card-title{font-family:'Cinzel',serif;font-size:13px;font-weight:600;letter-spacing:.08em;margin-bottom:16px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:14px;margin-bottom:24px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 20px}
.stat-l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.stat-v{font-family:'Cinzel',serif;font-size:24px;font-weight:700}
/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
/* TABS */
.atabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px;flex-wrap:wrap}
.atab{padding:11px 20px;background:transparent;border:none;color:var(--muted);font-family:'Raleway',sans-serif;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;margin-bottom:-1px}
.atab:hover{color:var(--text)}
.atab.active{color:var(--gold);border-bottom-color:var(--gold)}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(7,9,15,0.88);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px;backdrop-filter:blur(4px)}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:32px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Cinzel',serif;font-size:15px;font-weight:600;margin-bottom:24px}
.modal-acts{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
/* COURSES */
.courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px}
.ccard{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s}
.ccard:hover{border-color:rgba(201,168,76,0.3);transform:translateY(-2px)}
.cthumb{height:100px;display:flex;align-items:center;justify-content:center;font-size:32px;position:relative}
.cthumb-b{background:linear-gradient(135deg,rgba(34,197,94,0.15),rgba(34,197,94,0.04))}
.cthumb-a{background:linear-gradient(135deg,rgba(59,130,246,0.15),rgba(59,130,246,0.04))}
.cbody{padding:14px 16px}
.ctitle{font-family:'Cinzel',serif;font-size:13px;font-weight:600;margin-bottom:4px}
.cmeta{font-size:11px;color:var(--muted)}
/* VIDEO */
.vid-wrap{background:#000;border-radius:10px;overflow:hidden;aspect-ratio:16/9;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.vid-wrap iframe{width:100%;height:100%;border:none;display:block}
.vid-ph{text-align:center;color:var(--muted);padding:24px}
.two-col{display:grid;grid-template-columns:1fr 320px;gap:20px}
.sec-item{border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;background:var(--bg3)}
.sec-hdr:hover{background:rgba(255,255,255,0.03)}
.sec-title{font-family:'Cinzel',serif;font-size:12px;font-weight:600}
.lesson-row{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-top:1px solid rgba(255,255,255,0.03);transition:background .2s}
.lesson-row:hover{background:rgba(255,255,255,0.03)}
.lesson-row.active{background:rgba(201,168,76,0.06)}
/* JOURNAL */
.jentry{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:10px}
.jdate{font-size:11px;color:var(--muted);margin-bottom:6px}
.jtext{font-size:13px;line-height:1.7;white-space:pre-wrap}
/* CHECKLIST */
.cl-item{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:7px;cursor:pointer}
.cl-item:hover{border-color:rgba(255,255,255,0.12)}
.chk{width:20px;height:20px;flex-shrink:0;border:1.5px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .2s}
.chk.on{background:var(--green);border-color:var(--green);color:#07090F;font-weight:700}
/* PENDING */
.pend-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);text-align:center;padding:24px}
.pend-box{max-width:400px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:48px 36px}
/* ADMIN LOGIN */
.adm-wrap{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px}
.adm-box{width:100%;max-width:400px;background:var(--bg2);border:1px solid rgba(201,168,76,0.25);border-radius:12px;padding:48px 40px;position:relative}
.adm-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:12px 12px 0 0}
/* MISC */
.uname{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.uemail{font-size:11px;color:var(--muted)}
.logout-btn{margin-top:12px;width:100%;padding:8px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:var(--r);font-family:'Raleway',sans-serif;font-size:12px;cursor:pointer;transition:all .2s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}
.empty{text-align:center;padding:48px 24px;color:var(--muted)}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;cursor:pointer;margin-bottom:20px}
.back-link:hover{color:var(--text)}
.notif{background:var(--red);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700;margin-left:auto}
.pb-sec{margin-bottom:24px}
.pb-hdr{font-family:'Cinzel',serif;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(201,168,76,0.2)}
.pb-rule{display:flex;gap:12px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:7px}
.pb-num{font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:var(--gold);opacity:.7;flex-shrink:0;width:22px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}
@media(max-width:700px){.sidebar{display:none}.page{padding:16px}.topbar{padding:14px 16px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const SURL = "https://cxjbyhzibjinkeypuaak.supabase.co";
const SKEY = "sb_publishable_Ssp5xNESQAE10boERO-ESg_c-XENyQ8";
const sb = supabase.createClient(SURL, SKEY);

// ── STATE ──────────────────────────────────────────────────────────────────
let state = {
  screen: 'loading', // loading | auth | admin-login | pending | declined | portal | admin
  user: null,
  profile: null,
  // portal
  page: 'dashboard',
  // admin
  adminTab: 'users',
  users: [], courses: [], sections: [], videos: [],
  adminLoading: true,
  modal: null, modalForm: {},
  adminMsg: '',
  search: '',
  // courses
  coursePage: 'list', // list | detail
  selectedCourse: null,
  courseSections: [], courseVideos: [],
  activeVideo: null, openSections: {},
  // journal
  journalEntries: [], journalLoading: true, journalText: '',
  // checklist
  checkItems: {}, checkLoading: true,
};

function setState(patch) {
  Object.assign(state, patch);
  render();
}

// ── HELPERS ────────────────────────────────────────────────────────────────
function fmt(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-ZA', {day:'numeric',month:'short',year:'numeric'});
}
function badge(level) {
  const map = {
    beginner: ['badge-b','Beginner'],
    advanced: ['badge-a','Advanced'],
    admin: ['badge-admin','Admin'],
    pending: ['badge-p','Pending'],
    declined: ['badge-p','Declined'],
  };
  const [cls, lbl] = map[level] || ['badge-p', level || 'Pending'];
  return `<span class="badge ${cls}">&#9679; ${lbl}</span>`;
}
function el(id) { return document.getElementById(id); }
function val(id) { return el(id) ? el(id).value : ''; }
function setHTML(id, html) { const e = el(id); if (e) e.innerHTML = html; }
function show(id) { const e = el(id); if (e) e.classList.remove('hide'); }
function hide(id) { const e = el(id); if (e) e.classList.add('hide'); }
function flash(msg) {
  setState({adminMsg: msg});
  setTimeout(() => setState({adminMsg: ''}), 3000);
}

// ── SUPABASE ───────────────────────────────────────────────────────────────
async function loadProfile(userId) {
  const {data} = await sb.from('users').select('*').eq('id', userId).single();
  return data || {};
}

async function loadAdminData() {
  setState({adminLoading: true});
  const [u,c,s,v] = await Promise.all([
    sb.from('users').select('*').order('created_at',{ascending:false}),
    sb.from('courses').select('*').order('order_index'),
    sb.from('sections').select('*').order('order_index'),
    sb.from('videos').select('*').order('order_index'),
  ]);
  setState({
    users: u.data||[], courses: c.data||[],
    sections: s.data||[], videos: v.data||[],
    adminLoading: false
  });
}

// ── INIT ───────────────────────────────────────────────────────────────────
async function init() {
  const {data:{session}} = await sb.auth.getSession();
  if (session) {
    const profile = await loadProfile(session.user.id);
    const screen = profile.is_admin ? 'admin' : (profile.status === 'active' ? 'portal' : (profile.status === 'declined' ? 'declined' : 'pending'));
    setState({user: session.user, profile, screen});
    if (screen === 'admin') loadAdminData();
    if (screen === 'portal') {
      loadJournal();
      loadChecklist();
    }
  } else {
    setState({screen: 'auth'});
  }
}

sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_OUT') setState({screen:'auth', user:null, profile:null});
});

// ── AUTH ───────────────────────────────────────────────────────────────────
async function doLogin() {
  const email = val('login-email');
  const password = val('login-pw');
  const btn = el('login-btn');
  btn.disabled = true; btn.textContent = 'Signing in...';
  setHTML('login-err', '');
  try {
    const {data, error} = await sb.auth.signInWithPassword({email, password});
    if (error) throw error;
    const profile = await loadProfile(data.user.id);
    const screen = profile.is_admin ? 'admin' : (profile.status === 'active' ? 'portal' : (profile.status === 'declined' ? 'declined' : 'pending'));
    setState({user: data.user, profile, screen});
    if (screen === 'admin') loadAdminData();
    if (screen === 'portal') { loadJournal(); loadChecklist(); }
  } catch(e) {
    setHTML('login-err', `<div class="alert alert-err">${e.message}</div>`);
  }
  btn.disabled = false; btn.textContent = 'Sign In';
}

async function doRegister() {
  const email = val('reg-email');
  const password = val('reg-pw');
  const full_name = val('reg-name');
  const membership_level = val('reg-level');
  const btn = el('reg-btn');
  btn.disabled = true; btn.textContent = 'Creating...';
  setHTML('reg-err', '');
  try {
    const {data, error} = await sb.auth.signUp({email, password});
    if (error) throw error;
    await sb.from('users').insert({id:data.user.id, email, full_name, membership_level, status:'pending', created_at:new Date().toISOString()});
    setHTML('reg-err', '<div class="alert alert-ok">Registration successful! Awaiting admin approval.</div>');
    setTimeout(() => switchAuthTab('login'), 2000);
  } catch(e) {
    setHTML('reg-err', `<div class="alert alert-err">${e.message}</div>`);
  }
  btn.disabled = false; btn.textContent = 'Create Account';
}

async function doAdminLogin() {
  const email = val('adm-email');
  const password = val('adm-pw');
  const btn = el('adm-btn');
  btn.disabled = true; btn.textContent = 'Signing in...';
  setHTML('adm-err', '');
  try {
    const {data, error} = await sb.auth.signInWithPassword({email, password});
    if (error) throw error;
    const profile = await loadProfile(data.user.id);
    if (!profile.is_admin) throw new Error('No admin access for this account.');
    setState({user: data.user, profile, screen:'admin'});
    loadAdminData();
  } catch(e) {
    setHTML('adm-err', `<div class="alert alert-err">${e.message}</div>`);
  }
  btn.disabled = false; btn.textContent = 'Enter Admin Panel';
}

async function doLogout() {
  await sb.auth.signOut();
  setState({screen:'auth', user:null, profile:null, page:'dashboard', coursePage:'list'});
}

function switchAuthTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  el('login-form') && el('login-form').classList.toggle('hide', tab !== 'login');
  el('reg-form') && el('reg-form').classList.toggle('hide', tab !== 'register');
}

// ── ADMIN ACTIONS ──────────────────────────────────────────────────────────
async function approveUser(id) {
  await sb.from('users').update({status:'active'}).eq('id',id);
  flash('✓ User approved'); loadAdminData();
}
async function declineUser(id) {
  await sb.from('users').update({status:'declined'}).eq('id',id);
  flash('User declined'); loadAdminData();
}
async function changeLevel(id, level) {
  await sb.from('users').update({membership_level:level}).eq('id',id);
  flash('✓ Level updated'); loadAdminData();
}
async function deleteUser(id) {
  if (!confirm('Delete this user permanently?')) return;
  await sb.from('users').delete().eq('id',id);
  loadAdminData();
}
async function deleteItem(table, id) {
  if (!confirm('Delete this item?')) return;
  await sb.from(table).delete().eq('id',id);
  flash('Deleted'); loadAdminData();
}

function openModal(type, item) {
  setState({modal: type, modalForm: item ? {...item} : {}});
}
function closeModal() {
  setState({modal: null, modalForm: {}});
}

async function saveModal() {
  const type = state.modal;
  const form = state.modalForm;
  const id = form.id;
  const payload = {...form};
  delete payload.id;
  if (type === 'course') {
    if (id) await sb.from('courses').update(payload).eq('id',id);
    else await sb.from('courses').insert({...payload, order_index: state.courses.length});
  } else if (type === 'section') {
    if (id) await sb.from('sections').update(payload).eq('id',id);
    else await sb.from('sections').insert({...payload, order_index: state.sections.length});
  } else if (type === 'video') {
    if (id) await sb.from('videos').update(payload).eq('id',id);
    else await sb.from('videos').insert({...payload, order_index: state.videos.length});
  }
  closeModal(); flash('✓ Saved'); loadAdminData();
}

function updateForm(key, value) {
  state.modalForm[key] = value;
}

// ── COURSES ────────────────────────────────────────────────────────────────
async function openCourse(course) {
  const {data:secs} = await sb.from('sections').select('*').eq('course_id',course.id).order('order_index');
  let vids = [];
  if (secs && secs.length) {
    const {data:v} = await sb.from('videos').select('*').in('section_id', secs.map(s=>s.id)).order('order_index');
    vids = v || [];
  }
  const open = {};
  (secs||[]).forEach(s => open[s.id] = true);
  setState({
    coursePage:'detail', selectedCourse:course,
    courseSections:secs||[], courseVideos:vids,
    activeVideo: vids.length ? vids[0] : null,
    openSections: open
  });
}

function toggleSection(id) {
  state.openSections[id] = !state.openSections[id];
  render();
}

function setActiveVideo(v) {
  setState({activeVideo: v});
}

// ── JOURNAL ────────────────────────────────────────────────────────────────
async function loadJournal() {
  setState({journalLoading:true});
  const {data} = await sb.from('journal_entries').select('*').eq('user_id',state.user.id).order('created_at',{ascending:false});
  setState({journalEntries:data||[], journalLoading:false});
}

async function saveJournal() {
  const text = val('j-text');
  if (!text.trim()) return;
  const btn = el('j-btn');
  btn.disabled = true; btn.textContent = 'Saving...';
  await sb.from('journal_entries').insert({user_id:state.user.id, content:text, created_at:new Date().toISOString()});
  await loadJournal();
  if (el('j-text')) el('j-text').value = '';
  btn.disabled = false; btn.textContent = '+ Save Entry';
}

async function deleteJournal(id) {
  if (!confirm('Delete this entry?')) return;
  await sb.from('journal_entries').delete().eq('id',id);
  setState({journalEntries: state.journalEntries.filter(e=>e.id!==id)});
}

async function loadChecklist() {
  const {data} = await sb.from('checklists').select('*').eq('user_id',state.user.id).single();
  setState({checkItems: (data && data.items) ? data.items : {}, checkLoading:false});
}

async function toggleCheck(idx) {
  const next = {...state.checkItems, [idx]: !state.checkItems[idx]};
  setState({checkItems: next});
  const {data} = await sb.from('checklists').select('id').eq('user_id',state.user.id).single();
  if (data) await sb.from('checklists').update({items:next}).eq('user_id',state.user.id);
  else await sb.from('checklists').insert({user_id:state.user.id, items:next});
}

                  ${u.status==='active'?`<span style="font-size:11px;color:var(--green)">&#10003; Active</span>`:''}
                  ${u.status==='declined'?`<button class="btn-sm btn-green" onclick="approveUser('${u.id}')">Re-approve</button>`:''}
                  <button class="btn-sm btn-red" onclick="deleteUser('${u.id}')">Delete</button>
                </div>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
        ${filtered.length===0?'<div class="empty"><div style="font-size:32px;margin-bottom:8px">👥</div><div>No members found.</div></div>':''}
      </div>
    </div>`;
  } else if (s.adminTab === 'courses') {
    tabContent = `
    <div style="margin-bottom:16px"><button class="btn-add" onclick="openModal('course',{})">+ Add Course</button></div>
    <div class="card">
      <table>
        <thead><tr><th>Title</th><th>Level</th><th>Description</th><th>Actions</th></tr></thead>
        <tbody>
          ${s.courses.map(c=>`<tr>
            <td style="font-weight:600">${c.emoji||''} ${c.title}</td>
            <td>${badge(c.level)}</td>
            <td style="color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.description||''}</td>
            <td><div style="display:flex;gap:5px"><button class="btn-sm btn-gold" onclick="openModal('course',${JSON.stringify(c).replace(/"/g,'&quot;')})">Edit</button><button class="btn-sm btn-red" onclick="deleteItem('courses','${c.id}')">Delete</button></div></td>
          </tr>`).join('')}
        </tbody>
      </table>
      ${s.courses.length===0?'<div class="empty"><div style="font-size:32px;margin-bottom:8px">📚</div><div>No courses yet.</div></div>':''}
    </div>`;
  } else if (s.adminTab === 'sections') {
    tabContent = `
    <div style="margin-bottom:16px"><button class="btn-add" onclick="openModal('section',{})">+ Add Section</button></div>
    <div class="card">
      <table>
        <thead><tr><th>Title</th><th>Course</th><th>Actions</th></tr></thead>
        <tbody>
          ${s.sections.map(sec=>{
            const course = s.courses.find(c=>c.id===sec.course_id);
            return `<tr>
              <td style="font-weight:600">${sec.title}</td>
              <td style="color:var(--muted)">${course?course.title:'—'}</td>
              <td><div style="display:flex;gap:5px"><button class="btn-sm btn-gold" onclick="openModal('section',${JSON.stringify(sec).replace(/"/g,'&quot;')})">Edit</button><button class="btn-sm btn-red" onclick="deleteItem('sections','${sec.id}')">Delete</button></div></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      ${s.sections.length===0?'<div class="empty"><div style="font-size:32px;margin-bottom:8px">📂</div><div>No sections yet.</div></div>':''}
    </div>`;
  } else if (s.adminTab === 'videos') {
    tabContent = `
    <div style="margin-bottom:16px;display:flex;gap:12px;align-items:center">
      <button class="btn-add" onclick="openModal('video',{})">+ Add Video</button>
      <span style="font-size:12px;color:var(--muted)">Paste Bunny.net embed code when adding</span>
    </div>
    <div class="card">
      <table>
        <thead><tr><th>Title</th><th>Section</th><th>Course</th><th>Duration</th><th>Actions</th></tr></thead>
        <tbody>
          ${s.videos.map(v=>{
            const sec = s.sections.find(s2=>s2.id===v.section_id);
            const course = sec?s.courses.find(c=>c.id===sec.course_id):null;
            return `<tr>
              <td style="font-weight:600">${v.title}</td>
              <td style="color:var(--muted)">${sec?sec.title:'—'}</td>
              <td style="color:var(--muted)">${course?course.title:'—'}</td>
              <td style="color:var(--muted)">${v.duration||'—'}</td>
              <td><div style="display:flex;gap:5px"><button class="btn-sm btn-gold" onclick="openModal('video',${JSON.stringify(v).replace(/"/g,'&quot;')})">Edit</button><button class="btn-sm btn-red" onclick="deleteItem('videos','${v.id}')">Delete</button></div></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      ${s.videos.length===0?'<div class="empty"><div style="font-size:32px;margin-bottom:8px">🎬</div><div>No videos yet.</div></div>':''}
    </div>`;
  }

  // Modal HTML
  let modalHTML = '';
  if (s.modal) {
    const f = s.modalForm;
    let fields = '';
    if (s.modal === 'course') {
      fields = `
        <div class="fg"><label class="fl">Course Title</label><input class="fi" value="${f.title||''}" oninput="updateForm('title',this.value)" placeholder="e.g. Beginner Foundation"/></div>
        <div class="fg"><label class="fl">Description</label><textarea class="fi" style="min-height:70px" oninput="updateForm('description',this.value)">${f.description||''}</textarea></div>
        <div class="fg"><label class="fl">Access Level</label><select class="fi" onchange="updateForm('level',this.value)"><option value="beginner"${(f.level||'beginner')==='beginner'?' selected':''}>Beginner</option><option value="advanced"${f.level==='advanced'?' selected':''}>Advanced</option></select></div>
        <div class="fg"><label class="fl">Emoji Icon</label><input class="fi" value="${f.emoji||''}" oninput="updateForm('emoji',this.value)" placeholder="📈"/></div>`;
    } else if (s.modal === 'section') {
      fields = `
        <div class="fg"><label class="fl">Section Title</label><input class="fi" value="${f.title||''}" oninput="updateForm('title',this.value)" placeholder="e.g. Module 1: Market Basics"/></div>
        <div class="fg"><label class="fl">Course</label><select class="fi" onchange="updateForm('course_id',this.value)"><option value="">— Select Course —</option>${s.courses.map(c=>`<option value="${c.id}"${f.course_id===c.id?' selected':''}>${c.title}</option>`).join('')}</select></div>`;
    } else if (s.modal === 'video') {
      fields = `
        <div class="fg"><label class="fl">Lesson Title</label><input class="fi" value="${f.title||''}" oninput="updateForm('title',this.value)" placeholder="e.g. Understanding Candlesticks"/></div>
        <div class="fg"><label class="fl">Section</label><select class="fi" onchange="updateForm('section_id',this.value)"><option value="">— Select Section —</option>${s.sections.map(sec=>{const c=s.courses.find(x=>x.id===sec.course_id);return `<option value="${sec.id}"${f.section_id===sec.id?' selected':''}>${c?c.title+' > ':''}${sec.title}</option>`;}).join('')}</select></div>
        <div class="fg"><label class="fl">Bunny.net Embed Code</label><textarea class="fi" style="min-height:90px;font-family:monospace;font-size:11px" oninput="updateForm('embed_code',this.value)" placeholder="Paste full Bunny.net iframe embed code here">${f.embed_code||''}</textarea><div style="font-size:11px;color:var(--muted);margin-top:5px">Bunny.net > Stream > your video > Share > Embed > copy full iframe</div></div>
        <div class="fg"><label class="fl">Duration (e.g. 12:30)</label><input class="fi" value="${f.duration||''}" oninput="updateForm('duration',this.value)" placeholder="00:00"/></div>
        <div class="fg"><label class="fl">Description (optional)</label><textarea class="fi" style="min-height:60px" oninput="updateForm('description',this.value)">${f.description||''}</textarea></div>`;
    }
    modalHTML = `
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal-box">
        <div class="modal-title">${f.id?'Edit':'Add'} ${s.modal.charAt(0).toUpperCase()+s.modal.slice(1)}</div>
        ${fields}
        <div class="modal-acts">
          <button class="btn-sm btn-red" onclick="closeModal()">Cancel</button>
          <button class="btn-sm btn-gold" style="background:var(--gold);color:#07090F;border-color:var(--gold)" onclick="saveModal()">Save</button>
        </div>
      </div>
    </div>`;
  }

  el('app').innerHTML = `
  <div class="shell">
    <aside class="sidebar">
      <div class="sb-logo"><span class="logo-big">DDP</span><span class="logo-sm">Forex Institute</span></div>
      <div class="sb-lbl">Admin</div>
      ${TABS.map((t,i)=>`<div class="nav-item${s.adminTab===t?' active':''}" onclick="setState({adminTab:'${t}'})">
        ${TICONS[i]} ${t.charAt(0).toUpperCase()+t.slice(1)}
        ${t==='users'&&pending>0?`<span class="notif">${pending}</span>`:''}
      </div>`).join('')}
      <div class="sb-lbl">Account</div>
      <div class="nav-item" onclick="doLogout()">&#8592; Sign Out</div>
      <div class="sb-foot">
        <span class="badge badge-admin">&#9679; Admin</span>
        <div style="margin-bottom:2px"></div>
        <div class="uname">${s.profile?.full_name||'Admin'}</div>
        <div class="uemail">${s.user?.email}</div>
      </div>
    </aside>
    <main class="main">
      <div class="topbar">
        <h2>${s.adminTab.charAt(0).toUpperCase()+s.adminTab.slice(1)}</h2>
        <div style="display:flex;align-items:center;gap:12px">
          ${s.adminMsg?`<span style="font-size:12px;color:var(--green)">${s.adminMsg}</span>`:''}
          <span class="badge badge-admin">&#9679; Admin</span>
        </div>
      </div>
      <div class="page">
        <div class="atabs">
          ${TABS.map((t,i)=>`<button class="atab${s.adminTab===t?' active':''}" onclick="setState({adminTab:'${t}'})">${t.charAt(0).toUpperCase()+t.slice(1)}${t==='users'&&pending>0?`<span class="notif" style="margin-left:6px">${pending}</span>`:''}</button>`).join('')}
        </div>
        ${tabContent}
      </div>
    </main>
  </div>
  ${modalHTML}`;
}

// ── START ──────────────────────────────────────────────────────────────────
render();
init();
</script>
</body>
</html>
