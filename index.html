<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DDP Forex Institute</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07090F;--bg2:#0D1017;--bg3:#111520;--border:rgba(255,255,255,0.07);--text:#E8EAF0;--muted:#6B7280;--green:#22C55E;--green-dim:rgba(34,197,94,0.12);--blue:#3B82F6;--blue-dim:rgba(59,130,246,0.12);--gold:#C9A84C;--danger:#EF4444;--radius:8px}
html,body,#root{height:100%}
body{background:var(--bg);color:var(--text);font-family:"Raleway",sans-serif;font-size:14px;line-height:1.6;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.cinzel{font-family:"Cinzel",serif}
.app-shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;min-width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-logo{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.sidebar-logo img{width:150px;filter:invert(1) brightness(0.85)}
.sidebar-section-label{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);padding:20px 24px 8px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 24px;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;border-left:2px solid transparent;user-select:none}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.nav-item.active{color:var(--text);border-left-color:var(--gold);background:rgba(201,168,76,0.06)}
.nav-item .icon{width:16px;text-align:center}
.sidebar-footer{margin-top:auto;padding:20px 24px;border-top:1px solid var(--border)}
.member-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.badge-beginner{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,0.3)}
.badge-advanced{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,0.3)}
.badge-admin{background:rgba(201,168,76,0.12);color:var(--gold);border:1px solid rgba(201,168,76,0.3)}
.badge-pending{background:rgba(239,68,68,0.1);color:var(--danger);border:1px solid rgba(239,68,68,0.3)}
.user-name{font-size:13px;font-weight:600;color:var(--text)}
.user-email{font-size:11px;color:var(--muted)}
.btn-logout{margin-top:12px;width:100%;padding:8px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:var(--radius);font-family:"Raleway",sans-serif;font-size:12px;cursor:pointer;transition:all .2s}
.btn-logout:hover{border-color:var(--danger);color:var(--danger)}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{padding:20px 36px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);position:sticky;top:0;z-index:5}
.topbar h2{font-family:"Cinzel",serif;font-size:16px;font-weight:600;letter-spacing:.08em}
.page{padding:36px;flex:1}
.auth-page{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{width:100%;max-width:440px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:48px 40px;position:relative}
.auth-card::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo img{width:170px;filter:invert(1) brightness(0.9);margin-bottom:8px}
.auth-logo p{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.auth-tabs{display:flex;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:28px;overflow:hidden}
.auth-tab{flex:1;padding:10px;background:transparent;border:none;color:var(--muted);font-family:"Raleway",sans-serif;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.auth-tab.active{background:rgba(201,168,76,0.1);color:var(--gold)}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.form-input{width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:"Raleway",sans-serif;font-size:13px;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--gold)}
.form-select{width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:"Raleway",sans-serif;font-size:13px;outline:none;cursor:pointer}
.form-select option{background:var(--bg3)}
.btn-primary{width:100%;padding:13px;background:var(--gold);border:none;border-radius:var(--radius);color:#07090F;font-family:"Cinzel",serif;font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:8px}
.btn-primary:hover{filter:brightness(1.1)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{padding:6px 14px;border:none;border-radius:var(--radius);font-family:"Raleway",sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-approve{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,0.3)}
.btn-approve:hover{background:var(--green);color:#07090F}
.btn-decline{background:rgba(239,68,68,0.1);color:var(--danger);border:1px solid rgba(239,68,68,0.3)}
.btn-decline:hover{background:var(--danger);color:#fff}
.btn-edit{background:rgba(201,168,76,0.1);color:var(--gold);border:1px solid rgba(201,168,76,0.3)}
.btn-edit:hover{background:var(--gold);color:#07090F}
.btn-delete{background:rgba(239,68,68,0.08);color:var(--danger);border:1px solid rgba(239,68,68,0.2)}
.btn-delete:hover{background:var(--danger);color:#fff}
.btn-add{padding:9px 18px;background:var(--gold);border:none;border-radius:var(--radius);color:#07090F;font-family:"Raleway",sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-add:hover{filter:brightness(1.1)}
.alert{padding:12px 14px;border-radius:var(--radius);font-size:12px;margin-bottom:16px}
.alert-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#FCA5A5}
.alert-success{background:var(--green-dim);border:1px solid rgba(34,197,94,0.3);color:#86EFAC}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:24px}
.card-title{font-family:"Cinzel",serif;font-size:13px;font-weight:600;letter-spacing:.08em;margin-bottom:20px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px 24px}
.stat-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.stat-value{font-family:"Cinzel",serif;font-size:26px;font-weight:700}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)}
td{padding:12px 14px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.admin-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:28px;flex-wrap:wrap}
.admin-tab{padding:12px 20px;background:transparent;border:none;color:var(--muted);font-family:"Raleway",sans-serif;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;margin-bottom:-1px}
.admin-tab:hover{color:var(--text)}
.admin-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:20px}
.course-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s}
.course-card:hover{border-color:rgba(201,168,76,0.3);transform:translateY(-2px)}
.course-thumb{height:120px;display:flex;align-items:center;justify-content:center;font-size:36px;position:relative}
.course-thumb-beginner{background:linear-gradient(135deg,rgba(34,197,94,0.15),rgba(34,197,94,0.05))}
.course-thumb-advanced{background:linear-gradient(135deg,rgba(59,130,246,0.15),rgba(59,130,246,0.05))}
.course-body{padding:16px 18px}
.course-title{font-family:"Cinzel",serif;font-size:13px;font-weight:600;margin-bottom:4px}
.course-meta{font-size:11px;color:var(--muted)}
.section-item{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;background:var(--bg3);transition:background .2s}
.section-header:hover{background:rgba(255,255,255,0.03)}
.section-title{font-family:"Cinzel",serif;font-size:12px;font-weight:600;letter-spacing:.05em}
.section-chevron{color:var(--muted);transition:transform .2s;font-size:12px}
.section-chevron.open{transform:rotate(180deg)}
.section-lessons{border-top:1px solid var(--border)}
.lesson-item{display:flex;align-items:center;gap:12px;padding:12px 18px;cursor:pointer;transition:background .2s;border-bottom:1px solid rgba(255,255,255,0.03)}
.lesson-item:last-child{border-bottom:none}
.lesson-item:hover{background:rgba(255,255,255,0.03)}
.lesson-item.active{background:rgba(201,168,76,0.06)}
.lesson-title{font-size:13px;flex:1}
.lesson-duration{font-size:11px;color:var(--muted)}
.video-area{background:#000;border-radius:10px;overflow:hidden;aspect-ratio:16/9;margin-bottom:20px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.video-area iframe{width:100%;height:100%;border:none}
.video-placeholder{text-align:center;color:var(--muted)}
.video-placeholder .big-icon{font-size:48px;margin-bottom:12px}
.journal-textarea{width:100%;min-height:130px;padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:"Raleway",sans-serif;font-size:13px;line-height:1.7;resize:vertical;outline:none;transition:border-color .2s}
.journal-textarea:focus{border-color:var(--gold)}
.journal-entry{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:12px}
.journal-date{font-size:11px;color:var(--muted);margin-bottom:6px}
.journal-text{font-size:13px;line-height:1.7;white-space:pre-wrap}
.checklist-item{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;transition:all .2s}
.checklist-item:hover{border-color:rgba(255,255,255,0.12)}
.check-box{width:20px;height:20px;flex-shrink:0;border:1.5px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .2s}
.check-box.checked{background:var(--green);border-color:var(--green);color:#07090F;font-weight:700}
.check-text{font-size:13px;flex:1}
.check-text.done{text-decoration:line-through;color:var(--muted)}
.playbook-section{margin-bottom:28px}
.playbook-section-title{font-family:"Cinzel",serif;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid rgba(201,168,76,0.2)}
.playbook-rule{display:flex;gap:14px;padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px}
.rule-num{font-family:"Cinzel",serif;font-size:11px;font-weight:700;color:var(--gold);opacity:.7;flex-shrink:0;width:20px}
.rule-text{font-size:13px;line-height:1.6}
.modal-overlay{position:fixed;inset:0;background:rgba(7,9,15,0.88);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:32px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:"Cinzel",serif;font-size:15px;font-weight:600;margin-bottom:24px;letter-spacing:.06em}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
.btn-cancel{padding:9px 18px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:var(--radius);font-family:"Raleway",sans-serif;font-size:12px;cursor:pointer;transition:all .2s}
.btn-cancel:hover{border-color:var(--text);color:var(--text)}
.btn-save{padding:9px 18px;background:var(--gold);border:none;color:#07090F;border-radius:var(--radius);font-family:"Raleway",sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.pending-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);text-align:center;padding:24px}
.pending-card{max-width:420px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:48px 40px}
.pending-title{font-family:"Cinzel",serif;font-size:18px;font-weight:600;letter-spacing:.08em;margin:16px 0 12px}
.pending-text{font-size:13px;color:var(--muted);line-height:1.7}
.admin-login-page{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
.admin-login-page::before{content:"ADMIN";position:absolute;font-family:"Cinzel",serif;font-size:160px;font-weight:900;color:rgba(201,168,76,0.03);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;white-space:nowrap}
.admin-card{width:100%;max-width:420px;background:var(--bg2);border:1px solid rgba(201,168,76,0.25);border-radius:12px;padding:48px 40px;position:relative}
.admin-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:12px 12px 0 0}
.admin-card-logo{text-align:center;margin-bottom:28px}
.admin-card-logo img{width:150px;filter:invert(1) brightness(0.85);margin-bottom:16px}
.admin-badge-header{display:inline-flex;align-items:center;gap:6px;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);color:var(--gold);padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase}
.creds-box{background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.2);border-radius:var(--radius);padding:16px 20px;margin-top:20px}
.cred-line{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px}
.cred-line:last-child{border-bottom:none}
.cred-label{color:var(--muted)}
.cred-val{color:var(--gold);font-weight:600;font-family:monospace}
.empty-state{text-align:center;padding:60px 24px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-text{font-size:13px}
.two-col{display:grid;grid-template-columns:1fr 340px;gap:24px}
.action-row{display:flex;gap:6px;flex-wrap:wrap}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}
@media(max-width:700px){.sidebar{display:none}.page{padding:20px}.topbar{padding:16px 20px}}
</style>
</head>

function Badge({level}){

function AdminLoginPage({onLogin}){
  const [email,setEmail]=useState("");const [pw,setPw]=useState("");const [err,setErr]=useState("");const [loading,setLoading]=useState(false);const [show,setShow]=useState(false);
  async function handle(e){e.preventDefault();setErr("");setLoading(true);try{const{data,error}=await sb.auth.signInWithPassword({email,password:pw});if(error)throw error;const{data:p}=await sb.from("users").select("*").eq("id",data.user.id).single();if(!p?.is_admin)throw new Error("No admin access.");onLogin({...data.user,profile:p||{}});}catch(e){setErr(e.message);}finally{setLoading(false);}}
  return(<div className="admin-login-page"><div className="admin-card"><div className="admin-card-logo"><img src={LOGO_SRC} alt="DDP"/><div><span className="admin-badge-header">⚙ Admin Portal</span></div></div>{err&&<div className="alert alert-error">{err}</div>}<form onSubmit={handle}><div className="form-group"><label className="form-label">Admin Email</label><input className="form-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} required placeholder="admin@ddpforex.com"/></div><div className="form-group"><label className="form-label">Password</label><input className="form-input" type="password" value={pw} onChange={e=>setPw(e.target.value)} required placeholder="••••••••"/></div><button className="btn-primary" disabled={loading}>{loading?"Signing in…":"Enter Admin Panel"}</button></form><div style={{textAlign:"center",marginTop:20}}><span style={{fontSize:11,color:"var(--muted)",cursor:"pointer",textDecoration:"underline"}} onClick={()=>setShow(!show)}>{show?"Hide credentials":"Show admin credentials"}</span></div>{show&&<div className="creds-box"><div style={{fontSize:10,letterSpacing:".1em",textTransform:"uppercase",color:"var(--muted)",marginBottom:10}}>Your Admin Login Details</div><div className="cred-line"><span className="cred-label">Email</span><span className="cred-val">admin@ddpforex.com</span></div><div className="cred-line"><span className="cred-label">Password</span><span className="cred-val">DDP@Admin2025!</span></div><div style={{fontSize:10,color:"var(--muted)",marginTop:10}}>First: register this email on the member portal, then run the SQL in Supabase to set is_admin=true.</div></div>}<div style={{textAlign:"center",marginTop:20}}><span style={{fontSize:11,color:"var(--muted)",cursor:"pointer"}} onClick={()=>window.location.hash=""}>← Member portal</span></div></div></div>);
}
function AuthPage({onLogin,goAdmin}){
  const [tab,setTab]=useState("login");const [email,setEmail]=useState("");const [password,setPassword]=useState("");const [fullName,setFullName]=useState("");const [level,setLevel]=useState("beginner");const [loading,setLoading]=useState(false);const [error,setError]=useState("");const [success,setSuccess]=useState("");
  async function handleLogin(e){e.preventDefault();setLoading(true);setError("");try{const{data,error:err}=await sb.auth.signInWithPassword({email,password});if(err)throw err;const{data:profile}=await sb.from("users").select("*").eq("id",data.user.id).single();onLogin({...data.user,profile:profile||{}});}catch(err){setError(err.message);}finally{setLoading(false);}}
  async function handleRegister(e){e.preventDefault();setLoading(true);setError("");setSuccess("");try{const{data,error:err}=await sb.auth.signUp({email,password});if(err)throw err;await sb.from("users").insert({id:data.user.id,email,full_name:fullName,membership_level:level,status:"pending",created_at:new Date().toISOString()});setSuccess("Registration successful! Awaiting admin approval.");setTab("login");}catch(err){setError(err.message);}finally{setLoading(false);}}
  return(<div className="auth-page"><div className="auth-card"><div className="auth-logo"><img src={LOGO_SRC} alt="DDP"/><p>Member Portal</p></div>{error&&<div className="alert alert-error">{error}</div>}{success&&<div className="alert alert-success">{success}</div>}<div className="auth-tabs"><button className={} onClick={()=>setTab("login")}>Sign In</button><button className={} onClick={()=>setTab("register")}>Register</button></div>{tab==="login"?(<form onSubmit={handleLogin}><div className="form-group"><label className="form-label">Email</label><input className="form-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} required placeholder="you@example.com"/></div><div className="form-group"><label className="form-label">Password</label><input className="form-input" type="password" value={password} onChange={e=>setPassword(e.target.value)} required placeholder="••••••••"/></div><button className="btn-primary" disabled={loading}>{loading?"Signing in…":"Sign In"}</button></form>):(<form onSubmit={handleRegister}><div className="form-group"><label className="form-label">Full Name</label><input className="form-input" type="text" value={fullName} onChange={e=>setFullName(e.target.value)} required placeholder="John Doe"/></div><div className="form-group"><label className="form-label">Email</label><input className="form-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} required placeholder="you@example.com"/></div><div className="form-group"><label className="form-label">Password</label><input className="form-input" type="password" value={password} onChange={e=>setPassword(e.target.value)} required placeholder="Min 6 characters"/></div><div className="form-group"><label className="form-label">Membership Level</label><select className="form-select" value={level} onChange={e=>setLevel(e.target.value)}><option value="beginner">Beginner</option><option value="advanced">Advanced</option></select></div><button className="btn-primary" disabled={loading}>{loading?"Creating…":"Create Account"}</button></form>)}<div style={{textAlign:"center",marginTop:24}}><span style={{fontSize:11,color:"var(--muted)",cursor:"pointer"}} onClick={goAdmin}>Admin login →</span></div></div></div>);
}
function PendingScreen({user,onLogout}){return(<div className="pending-screen"><div className="pending-card"><img src={LOGO_SRC} alt="DDP" style={{width:120,filter:"invert(1) brightness(0.8)",marginBottom:16}}/><div style={{fontSize:32}}>⏳</div><h2 className="pending-title cinzel">Account Pending</h2><p className="pending-text">Thank you, <strong>{user.profile?.full_name||user.email}</strong>.<br/><br/>Your account is awaiting admin approval.</p><button className="btn-logout" style={{marginTop:28}} onClick={onLogout}>Sign Out</button></div></div>);}
function AdminPanel({adminUser,onLogout}){
  const [tab,setTab]=useState("users");
  const [users,setUsers]=useState([]);const [courses,setCourses]=useState([]);const [sections,setSections]=useState([]);const [videos,setVideos]=useState([]);
  const [loading,setLoading]=useState(true);const [modal,setModal]=useState(null);const [form,setForm]=useState({});const [msg,setMsg]=useState("");const [search,setSearch]=useState("");
  async function load(){setLoading(true);const[u,c,s,v]=await Promise.all([sb.from("users").select("*").order("created_at",{ascending:false}),sb.from("courses").select("*").order("order_index"),sb.from("sections").select("*").order("order_index"),sb.from("videos").select("*").order("order_index")]);setUsers(u.data||[]);setCourses(c.data||[]);setSections(s.data||[]);setVideos(v.data||[]);setLoading(false);}
  useEffect(()=>{load();},[]);
  function flash(m){setMsg(m);setTimeout(()=>setMsg(""),3000);}
  async function approveUser(id){await sb.from("users").update({status:"active"}).eq("id",id);flash("✓ User approved");load();}
  async function declineUser(id){await sb.from("users").update({status:"declined"}).eq("id",id);flash("User declined");load();}
  async function changeLevel(id,level){await sb.from("users").update({membership_level:level}).eq("id",id);flash("✓ Level updated");load();}
  async function deleteUser(id){if(!window.confirm("Delete this user permanently?"))return;await sb.from("users").delete().eq("id",id);load();}
  async function saveModal(){const{type,id}=modal;const payload={...form};if(type==="course"){if(id)await sb.from("courses").update(payload).eq("id",id);else await sb.from("courses").insert({...payload,order_index:courses.length});}else if(type==="section"){if(id)await sb.from("sections").update(payload).eq("id",id);else await sb.from("sections").insert({...payload,order_index:sections.length});}else if(type==="video"){if(id)await sb.from("videos").update(payload).eq("id",id);else await sb.from("videos").insert({...payload,order_index:videos.length});}setModal(null);setForm({});flash("✓ Saved");load();}
  async function deleteItem(table,id){if(!window.confirm("Delete?"))return;await sb.from(table).delete().eq("id",id);flash("Deleted");load();}
  function openModal(type,item={}){setModal({type,id:item.id||null});setForm({...item});}
  const stats={total:users.length,active:users.filter(u=>u.status==="active").length,pending:users.filter(u=>u.status==="pending").length,beginner:users.filter(u=>u.membership_level==="beginner"&&u.status==="active").length,advanced:users.filter(u=>u.membership_level==="advanced"&&u.status==="active").length};

iv>}</div>);})}</div></div></div>);

function JournalPage({userId}){

  if(!user)return <AuthPage onLogin={u=>{setUser(u);if(u.profile?.is_admin)setMode("admin");}} goAdmin={()=>setMode("admin-login")}/>;
  const status=user.profile?.status;
  if(status==="declined")return(<div className="pending-screen"><div className="pending-card"><img src={LOGO_SRC} alt="DDP" style={{width:120,filter:"invert(1) brightness(0.8)",marginBottom:16}}/><div style={{fontSize:32}}>✗</div><h2 className="pending-title cinzel">Access Declined</h2><p className="pending-text">Your application was declined. Please contact support.</p><button className="btn-logout" style={{marginTop:28}} onClick={logout}>Sign Out</button></div></div>);
  if(status!=="active")return <PendingScreen user={user} onLogout={logout}/>;
  return <MemberPortal user={user} onLogout={logout}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
